name: Weekly Radiotherapy Company Scout

on:
  schedule:
    # Runs every Monday at 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run company scout
        run: python scripts/scout.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/companies.json scripts/scout_report.md 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: weekly-scout-${{ github.run_number }}
          title: "Weekly scout: potential new companies to review"
          body: |
            ## Weekly Radiotherapy Company Scout

            This PR was auto-generated by the weekly scout workflow.

            It contains:
            - `scripts/scout_report.md` — candidate companies found via ClinicalTrials.gov + PubMed searches
            - Any suggested additions to `data/companies.json` (manual review required before merging)

            **Please review the report and manually verify each company before merging.**

            ---
            *Generated by GitHub Actions — scout run #${{ github.run_number }}*
          commit-message: "chore: weekly scout results"
          labels: scout, needs-review
